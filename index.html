<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DocxLite — Visor ultraligero de documentos DOCX. Sin Office, sin servidor, 100% offline.">
    <title>DocxLite</title>
    <!-- DOCXLITE:STYLE_START -->
    <link rel="stylesheet" href="style.css">
    <!-- DOCXLITE:STYLE_END -->
</head>
<body>
    <!-- ═══ Toolbar ═══ -->
    <header id="toolbar">
        <span id="doc-title">DocxLite</span>
        <nav id="toolbar-actions">
            <button id="btn-open" title="Abrir archivo (Ctrl+O)" aria-label="Abrir archivo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
            </button>
            <button id="btn-search" title="Buscar (Ctrl+F)" aria-label="Buscar en documento">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
            <button id="btn-edit" title="Editar markdown" aria-label="Editar markdown" class="hidden">Editar</button>
            <button id="btn-theme" title="Cambiar tema" aria-label="Cambiar tema">
                <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </nav>
        <input type="file" id="file-input" accept=".docx,.md,.markdown" hidden>
    </header>

    <!-- ═══ Search overlay ═══ -->
    <div id="search-bar" class="hidden">
        <input type="text" id="search-input" placeholder="Buscar en el documento..." autocomplete="off">
        <span id="search-count"></span>
        <button id="search-prev" title="Anterior" aria-label="Resultado anterior">▲</button>
        <button id="search-next" title="Siguiente" aria-label="Resultado siguiente">▼</button>
        <button id="search-close" title="Cerrar (Esc)" aria-label="Cerrar búsqueda">✕</button>
    </div>

    <!-- ═══ Progress bar ═══ -->
    <div id="progress" class="hidden">
        <div id="progress-bar"></div>
        <span id="progress-text"></span>
    </div>

    <!-- ═══ Drop zone (estado inicial) ═══ -->
    <main id="dropzone">
        <div id="drop-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <p>Arrastra un archivo <strong>.docx</strong> o <strong>.md</strong> aquí</p>
            <p class="drop-hint">o haz clic para abrir</p>
        </div>
    </main>

    <!-- ═══ Viewer (virtualizado) ═══ -->
    <article id="viewer" class="hidden"></article>

    <textarea id="markdown-editor" class="hidden" spellcheck="false"></textarea>

    <!-- ═══ Scripts ═══ -->
    <!-- DOCXLITE:SCRIPTS_START -->
    <script src="lib/mammoth.browser.min.js"></script>
    <script src="app.js"></script>
    <!-- DOCXLITE:SCRIPTS_END -->
</body>
</html>
