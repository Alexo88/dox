<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Khipu Codex — Visor ultraligero de documentos DOCX y Markdown. Sin Office, sin servidor, 100% offline.">
    <title>Khipu Codex</title>
    <!-- DOCXLITE:STYLE_START -->
    <link rel="stylesheet" href="style.css">
    <!-- DOCXLITE:STYLE_END -->
</head>
<body>
    <!-- ═══ Custom Titlebar (frameless) ═══ -->
    <header id="custom-titlebar" data-tauri-drag-region>
        <!-- Tabs zone (left) -->
        <div id="tabs-zone" data-tauri-drag-region>
            <div id="tabs-container"></div>
            <button id="btn-open" title="Abrir archivo (Ctrl+O)" aria-label="Abrir archivo" data-no-drag>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </div>

        <!-- Search zone (center) -->
        <div id="search-zone" data-no-drag>
            <input type="text" id="global-search" placeholder="Buscar..." autocomplete="off">
            <button id="btn-edit" title="Editar markdown" aria-label="Editar markdown" class="hidden">Editar</button>
            <button id="btn-theme" title="Cambiar tema" aria-label="Cambiar tema" data-no-drag>
                <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </div>

        <!-- Window controls zone (right) -->
        <div id="window-controls">
            <button id="btn-minimize" title="Minimizar" aria-label="Minimizar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="3" y1="8" x2="13" y2="8"/>
                </svg>
            </button>
            <button id="btn-maximize" title="Maximizar" aria-label="Maximizar">
                <svg id="icon-maximize" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="10" height="10" rx="1"/>
                </svg>
                <svg id="icon-restore" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
                    <rect x="5" y="3" width="8" height="8" rx="1"/>
                    <path d="M3 5h2v8H3z" fill="currentColor" stroke="none" opacity="0.3"/>
                    <rect x="3" y="5" width="8" height="8" rx="1"/>
                </svg>
            </button>
            <button id="btn-close" title="Cerrar" aria-label="Cerrar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                    <line x1="4" y1="4" x2="12" y2="12"/>
                    <line x1="12" y1="4" x2="4" y2="12"/>
                </svg>
            </button>
        </div>
        <input type="file" id="file-input" accept=".docx,.md,.markdown" hidden>
    </header>

    <!-- ═══ Search overlay (detailed controls) ═══ -->
    <div id="search-bar" class="hidden">
        <input type="text" id="search-input" placeholder="Buscar en el documento..." autocomplete="off">
        <span id="search-count"></span>
        <button id="search-prev" title="Anterior" aria-label="Resultado anterior">▲</button>
        <button id="search-next" title="Siguiente" aria-label="Resultado siguiente">▼</button>
        <button id="search-close" title="Cerrar (Esc)" aria-label="Cerrar búsqueda">✕</button>
    </div>

    <!-- ═══ Progress bar ═══ -->
    <div id="progress" class="hidden">
        <div id="progress-bar"></div>
        <span id="progress-text"></span>
    </div>

    <!-- ═══ Drop zone (estado inicial) ═══ -->
    <main id="dropzone">
        <div id="drop-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <p>Arrastra un archivo <strong>.docx</strong> o <strong>.md</strong> aquí</p>
            <p class="drop-hint">o haz clic para abrir</p>
        </div>
    </main>

    <!-- ═══ Viewer (virtualizado) ═══ -->
    <article id="viewer" class="hidden"></article>

    <textarea id="markdown-editor" class="hidden" spellcheck="false"></textarea>

    <!-- ═══ Scripts ═══ -->
    <!-- DOCXLITE:SCRIPTS_START -->
    <script src="lib/mammoth.browser.min.js"></script>
    <script src="app.js"></script>
    <!-- DOCXLITE:SCRIPTS_END -->
</body>
</html>
